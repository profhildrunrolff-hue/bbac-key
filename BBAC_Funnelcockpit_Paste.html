<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --earth: #7A5C3A; --earth-light: #F5EDE0; --earth-mid: #C4A882;
    --water: #2A5F7A; --water-light: #E0EEF5; --water-mid: #6EA8C4;
    --air:   #3A6B4E; --air-light:   #E0F0E8; --air-mid:   #7CB896;
    --fire:  #A83A18; --fire-light:  #F5E8E0; --fire-mid:  #D4784A;
    --ink: #1A1510; --parchment: #F8F4EE; --warm-grey: #E8E0D4; --mid-grey: #8A8078;
  }

  html { scroll-behavior: smooth; }
  body { font-family: 'EB Garamond', Georgia, serif; background: var(--parchment); color: var(--ink); min-height: 100vh; overflow-x: hidden; }

  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 1000; opacity: 0.5;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  }

  header { background: var(--ink); padding: 48px 48px 40px; position: relative; overflow: hidden; }
  header::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--earth-mid), var(--water-mid), var(--air-mid), var(--fire-mid)); }

  .header-eyebrow { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 0.3em; color: var(--earth-mid); text-transform: uppercase; margin-bottom: 16px; opacity: 0; animation: fadeUp 0.8s 0.1s forwards; }
  h1 { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: clamp(28px, 5vw, 44px); color: var(--parchment); letter-spacing: 0.04em; line-height: 1.2; opacity: 0; animation: fadeUp 0.8s 0.2s forwards; }
  .header-sub { font-family: 'EB Garamond', serif; font-style: italic; font-size: 15px; color: var(--mid-grey); margin-top: 10px; opacity: 0; animation: fadeUp 0.8s 0.3s forwards; }

  main { max-width: 1100px; margin: 0 auto; padding: 48px 24px 80px; }

  .element-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; margin-bottom: 48px; background: var(--warm-grey); border: 2px solid var(--warm-grey); opacity: 0; animation: fadeUp 0.8s 0.4s forwards; }
  @media (max-width: 600px) { .element-grid { grid-template-columns: repeat(2, 1fr); } }

  .element-btn { background: var(--parchment); border: none; padding: 28px 16px 24px; cursor: pointer; transition: background 0.3s; text-align: center; position: relative; overflow: hidden; }
  .element-btn::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--el-color); transform: scaleX(0); transition: transform 0.3s; transform-origin: left; }
  .element-btn:hover::before, .element-btn.active::before { transform: scaleX(1); }
  .element-btn.active { background: var(--el-color); }
  .element-btn.active .el-symbol, .element-btn.active .el-name, .element-btn.active .el-age { color: #fff !important; }
  .element-btn:hover:not(.active) { background: var(--el-light); }

  .el-symbol { font-size: 32px; color: var(--el-color); display: block; margin-bottom: 10px; transition: color 0.3s; line-height: 1; }
  .el-name { font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 0.15em; color: var(--el-color); display: block; margin-bottom: 4px; transition: color 0.3s; }
  .el-age { font-family: 'EB Garamond', serif; font-size: 11px; color: var(--mid-grey); font-style: italic; transition: color 0.3s; }

  .panel { background: #fff; border: 1px solid var(--warm-grey); border-top: 4px solid var(--el-color); display: none; animation: panelIn 0.4s ease forwards; }
  .panel.visible { display: block; }

  @keyframes panelIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  .panel-header { padding: 28px 36px 24px; border-bottom: 1px solid var(--warm-grey); display: grid; grid-template-columns: 1fr 1fr; gap: 32px; background: var(--el-light); }
  @media (max-width: 600px) { .panel-header { grid-template-columns: 1fr; } }

  .panel-header-label { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.25em; color: var(--el-color); text-transform: uppercase; margin-bottom: 8px; }
  .panel-system { font-size: 14px; color: #555; line-height: 1.6; }
  .panel-resource { font-style: italic; font-size: 14px; color: #333; line-height: 1.75; border-left: 3px solid var(--el-color); padding-left: 16px; }

  .tabs { display: flex; border-bottom: 1px solid var(--warm-grey); overflow-x: auto; }
  .tab-btn { flex: 1; min-width: 100px; padding: 14px 10px; background: none; border: none; border-bottom: 3px solid transparent; cursor: pointer; font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.15em; color: var(--mid-grey); text-transform: uppercase; transition: all 0.2s; white-space: nowrap; }
  .tab-btn:hover { color: var(--el-color); background: var(--el-light); }
  .tab-btn.active { color: var(--el-color); border-bottom-color: var(--el-color); background: #fff; }

  .tab-content { display: none; padding: 36px; }
  .tab-content.visible { display: block; animation: panelIn 0.3s ease forwards; }

  .diag-item { display: flex; gap: 16px; margin-bottom: 14px; padding: 16px 18px; background: var(--el-light); border-left: 3px solid var(--el-color); }
  .diag-num { font-family: 'Cinzel', serif; font-size: 11px; color: var(--el-color); font-weight: 600; min-width: 20px; padding-top: 2px; }
  .diag-text { font-size: 14px; line-height: 1.75; color: #333; }

  .convergence-box { margin-top: 28px; padding: 20px 24px; background: var(--ink); }
  .convergence-box .label { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.25em; color: var(--el-mid); text-transform: uppercase; margin-bottom: 10px; }
  .convergence-box p { font-style: italic; font-size: 13px; color: #ccc; line-height: 1.8; }

  .data-table { width: 100%; border-collapse: collapse; }
  .data-table th { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.2em; color: var(--el-color); text-transform: uppercase; padding: 10px 14px; background: var(--el-light); text-align: left; border-bottom: 2px solid var(--el-color); }
  .data-table td { padding: 11px 14px; font-size: 13px; line-height: 1.6; border-bottom: 1px solid var(--warm-grey); vertical-align: top; }
  .data-table tr:nth-child(even) td { background: #fafafa; }
  .data-table td:first-child { font-weight: 500; color: #333; }
  .data-table td:last-child { color: #666; font-style: italic; }

  .bridge-box { margin-top: 28px; padding: 20px 24px; border-left: 5px solid var(--el-color); background: var(--el-light); }
  .bridge-box .label { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.25em; color: var(--el-color); text-transform: uppercase; margin-bottom: 10px; }
  .bridge-box p { font-size: 16px; font-style: italic; color: var(--ink); line-height: 1.75; }

  .q-item { display: flex; gap: 20px; margin-bottom: 20px; align-items: flex-start; }
  .q-num { width: 36px; height: 36px; border-radius: 50%; background: var(--el-color); color: #fff; display: flex; align-items: center; justify-content: center; font-family: 'Cinzel', serif; font-size: 13px; flex-shrink: 0; }
  .q-text { font-size: 15px; font-style: italic; color: #333; line-height: 1.8; padding-top: 6px; }

  .resource-note { margin-top: 32px; padding: 20px 24px; background: var(--ink); }
  .resource-note .label { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.25em; color: var(--el-mid); text-transform: uppercase; margin-bottom: 10px; }
  .resource-note p { font-style: italic; font-size: 13px; color: #ccc; line-height: 1.8; }

  /* ── ILLUSTRATIONS TAB ── */
  .illus-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
  @media (max-width: 640px) { .illus-grid { grid-template-columns: 1fr; } }

  .illus-card { background: var(--el-light); border: 1px solid var(--warm-grey); padding: 24px; }
  .illus-card-title { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 0.2em; color: var(--el-color); text-transform: uppercase; margin-bottom: 16px; text-align: center; }
  .illus-card svg { display: block; margin: 0 auto; }
  .illus-caption { font-size: 12px; font-style: italic; color: var(--mid-grey); text-align: center; margin-top: 12px; line-height: 1.5; }

  .placeholder { text-align: center; padding: 80px 20px; color: var(--mid-grey); font-style: italic; font-size: 16px; border: 2px dashed var(--warm-grey); opacity: 0; animation: fadeUp 0.8s 0.5s forwards; }

  footer { text-align: center; padding: 40px 24px; font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.2em; color: var(--mid-grey); text-transform: uppercase; border-top: 1px solid var(--warm-grey); }
</style>
</style>
<body>

  <div class="header-eyebrow">Biography-Based Art Coaching · BBAC · earth-s institute</div>

<main>

</main>

<footer>Biography-Based Art Coaching (BBAC) &nbsp;·&nbsp; Prof. Hildrun Rolff &nbsp;·&nbsp; earth-s institute</footer>

const TABS = ['Diagnostics', 'Schema Play', 'Activities Today', 'Coaching Questions', 'Illustrations'];

let currentEl = null;
let currentTab = 0;

function selectElement(id, btn) {
  document.querySelectorAll('.element-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentEl = id;
  currentTab = 0;
  document.getElementById('empty').style.display = 'none';
  renderPanel();
}

function renderPanel() {
  const d = DATA[currentEl];
  const container = document.getElementById('panels');
  container.style.display = 'block';

  container.innerHTML = `
    <div class="panel visible"
      style="--el-color:${d.color};--el-light:${d.light};--el-mid:${d.mid};">

      <div class="panel-header">
        <div>
          <div class="panel-header-label">Learning Field</div>
          <div class="panel-system">${d.system}</div>
          <div style="margin-top:10px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.2em;color:${d.color};opacity:0.7;">${d.phase}</div>
        </div>
        <div>
          <div class="panel-header-label">Core Resource</div>
          <div class="panel-resource">"${d.resource}"</div>
        </div>
      </div>

      <div class="tabs">
        ${TABS.map((t,i) => `<button class="tab-btn ${i===currentTab?'active':''}" onclick="switchTab(${i})">${t}</button>`).join('')}
      </div>

      ${renderTab(0,d)}
      ${renderTab(1,d)}
      ${renderTab(2,d)}
      ${renderTab(3,d)}
      ${renderTab(4,d)}
    </div>
  `;
}

function renderTab(i, d) {
  const vis = i === currentTab ? 'visible' : '';
  const el = currentEl;

  if (i === 0) return `
    <div class="tab-content ${vis}" id="tab-0">
      ${d.diagnostics.map((t,n) => `
        <div class="diag-item">
          <span class="diag-num">${n+1}</span>
          <span class="diag-text">${t}</span>
        </div>`).join('')}
      <div class="convergence-box">
        <div class="label">Convergence Principle</div>
        <p>When all three settings point to the same developmental window, this is no coincidence – it is a highly significant biographical theme.</p>
      </div>
    </div>`;

  if (i === 1) return `
    <div class="tab-content ${vis}" id="tab-1">
      <table class="data-table">
        <thead><tr><th>Schema Play</th><th>Expression / Examples</th></tr></thead>
        <tbody>${d.schemas.map(([a,b]) => `<tr><td>${a}</td><td>${b}</td></tr>`).join('')}</tbody>
      </table>
    </div>`;

  if (i === 2) return `
    <div class="tab-content ${vis}" id="tab-2">
      <table class="data-table">
        <thead><tr><th>Schema Play</th><th>Favourite Activity Today</th></tr></thead>
        <tbody>${d.activities.map(([a,b]) => `<tr><td>${a}</td><td>${b}</td></tr>`).join('')}</tbody>
      </table>
      <div class="bridge-box">
        <div class="label">Bridge Question</div>
        <p>"${d.bridge}"</p>
      </div>
    </div>`;

  if (i === 3) return `
    <div class="tab-content ${vis}" id="tab-3">
      ${d.questions.map((q,n) => `
        <div class="q-item">
          <div class="q-num">${n+1}</div>
          <div class="q-text">"${q}"</div>
        </div>`).join('')}
      <div class="resource-note">
        <div class="label">Resource-Oriented Approach</div>
        <p>The question is never: What is missing? — but rather: What is bound up there, and how can it become accessible again?</p>
      </div>
    </div>`;

  if (i === 4) return `
    <div class="tab-content ${vis}" id="tab-4">
      <div class="illus-grid">
        <div class="illus-card">
          <div class="illus-card-title">Head–Body Proportion</div>
          ${SVG.proportion[el]}
          <div class="illus-caption">Developmental stage visible in figure drawing</div>
        </div>
        <div class="illus-card">
          <div class="illus-card-title">Children's Drawing Signature</div>
          ${SVG.drawing[el]}
          <div class="illus-caption">The characteristic mark of this phase</div>
        </div>
        <div class="illus-card">
          <div class="illus-card-title">Schema Play Sketches</div>
          ${SVG.schema[el]}
          <div class="illus-caption">Early movement patterns of this phase</div>
        </div>
        <div class="illus-card">
          <div class="illus-card-title">Activities &amp; Sport Today</div>
          ${SVG.sport[el]}
          <div class="illus-caption">The schema alive in adult life</div>
        </div>
      </div>
    </div>`;

  return '';
}

function switchTab(i) {
  currentTab = i;
  document.querySelectorAll('.tab-btn').forEach((b,n) => b.classList.toggle('active', n===i));
  document.querySelectorAll('.tab-content').forEach((c,n) => c.classList.toggle('visible', n===i));
}
